<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IncomeFlow – Beta Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: min(380px, 90vw);
      text-align: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f1f5f9;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }

    input[type="password"]:focus {
      border-color: #3b82f6;
    }

    input[type="password"].error {
      border-color: #ef4444;
    }

    button {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #2563eb; }

    .error-msg {
      font-size: 0.82rem;
      color: #ef4444;
      margin-top: 0.6rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">IncomeFlow</div>
    <div class="subtitle">Beta access only</div>
    <label for="pw">Password</label>
    <input type="password" id="pw" placeholder="Enter beta password" autocomplete="current-password"/>
    <button id="btn">Continue</button>
    <div class="error-msg" id="err"></div>
  </div>

  <script>
    // SHA-256 hash of "beta-access-2026"
    const HASH = '8df665ca49d5c23ae89979d7d824f2a3edc40692a1623418efc9e3d634a9f25a';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function attempt() {
      const pw   = document.getElementById('pw');
      const err  = document.getElementById('err');
      const hash = await sha256(pw.value.trim());

      if (hash === HASH) {
        sessionStorage.setItem('incomeflow_auth', '1');
        window.location.replace('index.html');
      } else {
        pw.classList.add('error');
        err.textContent = 'Incorrect password. Please try again.';
        pw.focus();
      }
    }

    document.getElementById('btn').addEventListener('click', attempt);
    document.getElementById('pw').addEventListener('keydown', e => {
      document.getElementById('pw').classList.remove('error');
      document.getElementById('err').textContent = '';
      if (e.key === 'Enter') attempt();
    });
  </script>
</body>
</html>
