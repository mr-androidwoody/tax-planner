<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Test Harness — UK Retirement Tax SPA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; background: #0f1117; color: #e2e8f0;
      padding: 32px 24px; min-height: 100vh;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #f8fafc; }
    .subtitle { color: #64748b; margin-bottom: 28px; font-size: 13px; }

    #grand-total {
      display: flex; align-items: center; gap: 16px;
      background: #1e2330; border: 1px solid #2d3748;
      border-radius: 10px; padding: 18px 24px; margin-bottom: 28px;
    }
    #grand-total .label { color: #94a3b8; font-size: 13px; font-weight: 500; }
    #grand-total .count { font-size: 28px; font-weight: 700; }
    .pass-count { color: #4ade80; }
    .fail-count { color: #f87171; }
    #grand-total .sep { color: #475569; font-size: 22px; }
    .status-pill {
      margin-left: auto; padding: 6px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    }
    .status-pill.all-pass { background: #14532d; color: #4ade80; }
    .status-pill.has-fail { background: #450a0a; color: #f87171; }

    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 2px solid #2d3748; }
    th {
      text-align: left; padding: 8px 12px; font-size: 12px;
      font-weight: 600; color: #64748b; letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    th:not(:first-child) { text-align: right; }
    tbody tr { border-bottom: 1px solid #1e2330; }
    tbody tr:hover { background: #1a1f2e; }
    td { padding: 10px 12px; }
    td:not(:first-child) { text-align: right; }

    .suite-name { font-weight: 500; color: #cbd5e1; }
    .suite-link { color: #60a5fa; text-decoration: none; font-size: 12px; margin-left: 8px; }
    .suite-link:hover { text-decoration: underline; }
    .n-pass { color: #4ade80; }
    .n-fail { color: #f87171; }
    .n-total { color: #94a3b8; }
    .n-bug  { color: #fb923c; }
    .pill {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700;
    }
    .pill.pass { background: #14532d; color: #4ade80; }
    .pill.fail { background: #450a0a; color: #f87171; }
    .pill.bug  { background: #431407; color: #fb923c; }
    .load-error { color: #fb923c; font-style: italic; font-size: 12px; }
    #run-btn {
      display: inline-block; margin-bottom: 28px;
      padding: 10px 28px; border-radius: 8px; border: none; cursor: pointer;
      background: #3b82f6; color: #fff; font-size: 14px; font-weight: 600;
      letter-spacing: 0.03em; transition: background 0.15s;
    }
    #run-btn:hover { background: #2563eb; }
    #run-btn:disabled { background: #1e3a5f; color: #64748b; cursor: default; }
  </style>
</head>
<body>
  <h1>Test Harness</h1>
  <p class="subtitle">UK Retirement Tax SPA — all suites aggregated</p>
  <button id="run-btn">▶ Run all suites</button>
  <div id="grand-total" style="display:none"></div>
  <table>
    <thead>
      <tr>
        <th>Suite</th>
        <th>Passed</th>
        <th>Failed</th>
        <th>Known Bugs</th>
        <th>Total</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="results-body"></tbody>
  </table>

  <!-- Engine dependencies — identical relative path to the suite files -->
  <script src="../js/data.js"></script>
  <script src="../js/calculator.js"></script>
  <script src="../js/engine.js"></script>

  <script>
  (function () {
    'use strict';

    // ── Inlined suite logic (extracted up to // Render) ───────────────────
    const SUITES = [
  { name: "Tax Calculation", file: "tests.html", logic: `

  // ─────────────────────────────────────────────
  // Resolve functions from window.RetireCalc
  // ─────────────────────────────────────────────
  const C = window.RetireCalc;
  const TAX_2026 = window.RetireData.TAX_RULES['2026-27'];

  // Tolerance for floating point comparisons (pence)
  const EPSILON = 0.02;

  // ─────────────────────────────────────────────
  // Test runner
  // ─────────────────────────────────────────────
  const results = [];

  function test(id, label, actual, expected) {
    const delta   = Math.abs(actual - expected);
    const pass    = delta <= EPSILON;
    results.push({ id, label, actual, expected, delta, pass });
  }

  // ─────────────────────────────────────────────
  // Helper: shorthand for the income tax call
  // ─────────────────────────────────────────────
  function IT(ns, sav, div, rules) {
    return C.calcIncomeTaxDetailed(ns, sav, div, rules || TAX_2026);
  }

  // ─────────────────────────────────────────────
  // ── INCOME TAX: basic rate ───────────────────
  // ─────────────────────────────────────────────

  // S01 — Entirely below PA
  // £8,000 salary; PA=£12,570; nothing taxable → £0
  ;(function () {
    const r = IT(8000, 0, 0);
    test('S01', 'Salary below PA (£8,000)', r.tax, 0);
  })();

  // S02 — Salary only, basic rate
  // £30,000 − £12,570 PA = £17,430 @ 20% = £3,486
  ;(function () {
    const r = IT(30000, 0, 0);
    test('S02', 'Salary basic rate (£30,000)', r.tax, 3486);
  })();

  // S03 — Salary spanning basic → higher band
  // £60,000 − £12,570 = £47,430 taxable
  // £37,700 @ 20% = £7,540  +  £9,730 @ 40% = £3,892  →  £11,432
  ;(function () {
    const r = IT(60000, 0, 0);
    test('S03', 'Salary spanning basic→higher (£60,000)', r.tax, 11432);
  })();

  // ─────────────────────────────────────────────
  // ── INCOME TAX: savings / PSA / SRS ─────────
  // ─────────────────────────────────────────────

  // S04 — Basic-rate taxpayer; PSA = £1,000; interest partially taxable
  // Salary £20,000: nsNet = £7,430.  Interest £1,500: savNet = £1,500
  // SRS: nsNet > srsLimit (7430>5000) → srsAvail=0; savAfterSRS=1500
  // taxableForPSA = 7430+1500 = £8,930 < basicBand (£37,700) → PSA=£1,000
  // psaCover=min(1500,1000)=1000; savTaxable=500
  // nsTax = 7430×20% = £1,486
  // savTax = 500×20% = £100  (basic band has £30,270 room remaining)
  // Total = £1,586
  ;(function () {
    const r = IT(20000, 1500, 0);
    test('S04', 'Basic rate + interest, PSA=£1,000 (£20k sal, £1.5k int)', r.tax, 1586);
    test('S04b', '  └ savTaxable = £500', r.savTaxable, 500);
  })();

  // S05 — Higher-rate taxpayer; PSA = £500
  // Salary £51,000: nsNet = £38,430 (crosses into higher band)
  // taxableForPSA = 38430 > 37700 → PSA = £500
  // Interest £800: savNet=800; srsAvail=0; savAfterSRS=800
  // psaCover=min(800,500)=500; savTaxable=300
  // nsTax: 37700×20% + 730×40% = £7,540 + £292 = £7,832
  // savTax: bLeft=max(0,37700−38430)=0 → all 300@40% = £120
  // Total = £7,952
  ;(function () {
    const r = IT(51000, 800, 0);
    test('S05', 'Higher rate + interest, PSA=£500 (£51k sal, £800 int)', r.tax, 7952);
    test('S05b', '  └ PSA correctly £500 (not £1,000)', r.savTaxable, 300);
  })();

  // S06 — SRS absorbs all interest (low salary, meaningful savings)
  // Salary £5,000: all covered by PA → nsNet=0; paRem=7570
  // Interest £8,000: savNet = max(0, 8000−7570) = £430
  // srsAvail = max(0, 5000−0) = 5000; srsCover = min(430,5000) = 430 → savAfterSRS=0
  // taxableForPSA=430 → PSA=£1,000; psaCover=min(0,1000)=0; savTaxable=0
  // Total = £0
  ;(function () {
    const r = IT(5000, 8000, 0);
    test('S06', 'SRS absorbs all post-PA interest (£5k sal, £8k int)', r.tax, 0);
    // srsCover not returned directly; verify via savNet=£430 and savTaxable=£0
    test('S06b', '  └ savNet = £430 (post-PA interest, all covered by SRS)', r.savNet, 430);
    test('S06c', '  └ savTaxable = £0 (SRS absorbed all)', r.savTaxable, 0);
  })();

  // S07 — SRS partially used, PSA covers remainder
  // Salary £10,000: all covered by PA → nsNet=0; paRem=2570
  // Interest £8,000: savNet = max(0,8000−2570) = £5,430
  // srsAvail=5000; srsCover=5000; savAfterSRS=430
  // taxableForPSA=5430 < 37700 → PSA=1000; psaCover=min(430,1000)=430; savTaxable=0
  // Total = £0
  ;(function () {
    const r = IT(10000, 8000, 0);
    test('S07', 'SRS + PSA together cover all interest (£10k sal, £8k int)', r.tax, 0);
    test('S07b', '  └ savTaxable = £0', r.savTaxable, 0);
  })();

  // ─────────────────────────────────────────────
  // ── INCOME TAX: dividends ────────────────────
  // ─────────────────────────────────────────────

  // S08 — Dividends within £500 allowance
  // div=£400; divNet=400 (no PA needed); divTaxable=max(0,400−500)=0 → £0
  ;(function () {
    const r = IT(0, 0, 400);
    test('S08', 'Dividends within £500 allowance (£400)', r.tax, 0);
  })();

  // S09 — Dividends above allowance, basic rate
  // Salary £20,000: nsNet=£7,430.  Dividends £3,000: divNet=£3,000
  // divTaxable = max(0,3000−500) = £2,500
  // used = nsNet+savNet = 7430; bLeft = 37700−7430 = 30270; 2500×10.75% = £268.75
  // nsTax = 7430×20% = £1,486
  // Total = £1,754.75
  ;(function () {
    const r = IT(20000, 0, 3000);
    test('S09', 'Dividends above allowance, basic rate (£20k sal, £3k div)', r.tax, 1754.75);
    test('S09b', '  └ divTaxable = £2,500', r.divTaxable, 2500);
  })();

  // ─────────────────────────────────────────────
  // ── INCOME TAX: PA taper ─────────────────────
  // ─────────────────────────────────────────────

  // S10 — PA tapers (income = £110,000)
  // pa = 12570 − floor((110000−100000)/2) = 12570−5000 = £7,570
  // nsNet = 110000−7570 = £102,430
  // 37700×20% = £7,540  +  (102430−37700)×40% = 64730×40% = £25,892  →  £33,432
  ;(function () {
    const r = IT(110000, 0, 0);
    test('S10', 'PA taper at £110,000', r.tax, 33432);
  })();

  // S11 — Additional rate; PA fully withdrawn (income = £130,000)
  // pa = max(0, 12570 − floor((130000−100000)/2)) = max(0, 12570−15000) = £0
  // nsNet = £130,000
  // 37700×20%=£7,540 + 74870×40%=£29,948 + 17430×45%=£7,843.50 → £45,331.50
  ;(function () {
    const r = IT(130000, 0, 0);
    test('S11', 'Additional rate, PA=£0 (£130,000)', r.tax, 45331.50);
  })();

  // ─────────────────────────────────────────────
  // ── CGT ──────────────────────────────────────
  // ─────────────────────────────────────────────

  // C01 — All gain within basic band
  // taxableAfterPA=£10,000; gain=£5,000
  // basicBand=37700; basicUsed=10000; basicRem=27700; atBasic=5000 → 5000×18% = £900
  ;(function () {
    const r = C.calcCGT(10000, 5000, TAX_2026);
    test('C01', 'CGT all in basic band (income £10k, gain £5k)', r, 900);
  })();

  // C02 — Gain straddles basic/higher band
  // taxableAfterPA=£35,000; gain=£5,000
  // basicRem=37700−35000=2700; atBasic=2700×18%=£486; atHigher=2300×24%=£552 → £1,038
  ;(function () {
    const r = C.calcCGT(35000, 5000, TAX_2026);
    test('C02', 'CGT straddles bands (income £35k, gain £5k)', r, 1038);
  })();

  // C03 — All gain at higher rate (income already fills basic band)
  // taxableAfterPA=£40,000; basicUsed=37700; basicRem=0; all at 24% → 5000×24% = £1,200
  ;(function () {
    const r = C.calcCGT(40000, 5000, TAX_2026);
    test('C03', 'CGT all at higher rate (income £40k, gain £5k)', r, 1200);
  })();

  // C04 — Zero gain
  ;(function () {
    const r = C.calcCGT(20000, 0, TAX_2026);
    test('C04', 'CGT zero gain', r, 0);
  })();

  // ─────────────────────────────────────────────
  // ── NI ───────────────────────────────────────
  // ─────────────────────────────────────────────

  // N01 — Below primary threshold
  ;(function () {
    const r = C.calcEmployeeNI(10000, TAX_2026, false);
    test('N01', 'NI below PT (£10,000)', r, 0);
  })();

  // N02 — Between PT and UEL
  // (30000−12570) × 8% = 17430 × 8% = £1,394.40
  ;(function () {
    const r = C.calcEmployeeNI(30000, TAX_2026, false);
    test('N02', 'NI between PT and UEL (£30,000)', r, 1394.40);
  })();

  // N03 — Above UEL
  // (50270−12570)×8% + (60000−50270)×2% = 37700×8% + 9730×2% = £3,016 + £194.60 = £3,210.60
  ;(function () {
    const r = C.calcEmployeeNI(60000, TAX_2026, false);
    test('N03', 'NI above UEL (£60,000)', r, 3210.60);
  })();

  // N04 — At or above State Pension Age → always £0
  ;(function () {
    const r = C.calcEmployeeNI(60000, TAX_2026, true);
    test('N04', 'NI exempt at SPA (£60,000, aboveSPA=true)', r, 0);
  })();

  // ─────────────────────────────────────────────
` },
  { name: "Tax Validation (20)", file: "tests-20.html", logic: `

  const C   = window.RetireCalc;
  const E   = window.RetireEngine;
  const TAX = window.RetireData.TAX_RULES['2026-27'];

  const P   = 0.02;   // £0.02 tolerance for pure tax function tests
  const EP  = 1.00;   // £1.00 tolerance for full engine tests

  const results = [];
  function test(id, label, actual, expected, tol) {
    tol = tol !== undefined ? tol : P;
    const delta = Math.abs((actual || 0) - expected);
    results.push({ id, label, actual: actual || 0, expected, delta, pass: delta <= tol });
  }

  function IT(ns, sav, div) {
    return C.calcIncomeTaxDetailed(ns || 0, sav || 0, div || 0, TAX);
  }

  function runEngine(overrides) {
    const inputs = Object.assign({
      startYear: 2026, endYear: 2027,
      p1DOB: 1959, p2DOB: 1960,
      p1name: 'p1', p2name: 'p2',
      spending: 40000, stepDownPct: 0,
      p1Salary: 0, p1SalaryStop: null,
      p2Salary: 0, p2SalaryStop: null,
      p1SPAge: 99, p1SPAmt: 0,
      p2SPAge: 99, p2SPAmt: 0,
      growth: 0, inflation: 0,
      thresholdMode: 'never', thresholdFromYear: null,
      bniEnabled: false, bniP1GIA: 0, bniP2GIA: 0,
      dividendYield: 0,
      withdrawalMode: 'tax-aware',
      p1Order: ['ISA', 'GIA', 'SIPP', 'Cash'],
      p2Order: ['ISA', 'GIA', 'SIPP', 'Cash'],
      p1Bal: { Cash: 0, GIA: 0, SIPP: 0, ISA: 0 },
      p2Bal: { Cash: 0, GIA: 0, SIPP: 0, ISA: 0 },
    }, overrides);
    const orig = window.alert; window.alert = () => {};
    const result = E.runProjection(inputs, []);
    window.alert = orig;
    return result ? result.rows[0] : null;
  }

  // ══════════════════════════════════════════════
  // A. Personal Allowance & SIPP
  // ══════════════════════════════════════════════

  // T01 — Salary = £12,570 exactly
  // nsNet = 0; tax = £0
  ;(function(){
    const r = IT(12570, 0, 0);
    test('T01a', 'A1 · Salary = PA exactly (£12,570) → tax = £0',  r.tax,   0);
    test('T01b', 'A1 · nsNet = £0',                                 r.nsNet, 0);
  })();

  // T02 — Salary = £12,571 (one above PA)
  // nsNet = £1; tax = 1 × 20% = £0.20
  ;(function(){
    const r = IT(12571, 0, 0);
    test('T02a', 'A2 · Salary = PA + £1 (£12,571) → tax = £0.20', r.tax,   0.20);
    test('T02b', 'A2 · nsNet = £1',                                 r.nsNet, 1);
  })();

  // T03 — SIPP draw = £16,760; taxable portion = £16,760 × 75% = £12,570
  // nsNet = 0; tax = £0  (PA exactly filled by SIPP taxable)
  ;(function(){
    const taxable = Math.round(16760 * 0.75 * 100) / 100; // 12570
    const r = IT(taxable, 0, 0);
    test('T03a', 'A3 · SIPP draw £16,760 → taxable = £12,570 → tax = £0', r.tax,   0);
    test('T03b', 'A3 · nsNet = £0 (PA exactly absorbed)',                   r.nsNet, 0);
  })();

  // T04 — SIPP draw = £16,761; taxable = £16,761 × 75% = £12,570.75
  // nsNet = £0.75; tax = £0.75 × 20% = £0.15
  ;(function(){
    const taxable = Math.round(16761 * 0.75 * 100) / 100; // 12570.75
    const r = IT(taxable, 0, 0);
    test('T04a', 'A4 · SIPP draw £16,761 → taxable = £12,570.75 → tax = £0.15', r.tax,   0.15);
    test('T04b', 'A4 · nsNet = £0.75',                                            r.nsNet, 0.75);
  })();

  // T05 — SP = £10,000 + SIPP taxable = £2,570 → total NS = £12,570
  // nsNet = 0; tax = £0
  ;(function(){
    const r = IT(12570, 0, 0); // SP + SIPP taxable combined as nonSavings
    test('T05', 'A5 · SP £10k + SIPP taxable £2,570 = £12,570 → tax = £0', r.tax, 0);
  })();

  // ══════════════════════════════════════════════
  // B. Savings (Interest)
  // ══════════════════════════════════════════════

  // T06 — Interest £1,000 only
  // total=1000 < PA → divNet=0 → tax = £0
  ;(function(){
    const r = IT(0, 1000, 0);
    test('T06', 'B1 · Interest £1,000 only → PA absorbs all → tax = £0', r.tax, 0);
  })();

  // T07 — Interest £6,000 only
  // total=6000 < PA=12570 → PA absorbs → savNet=0 → tax = £0
  ;(function(){
    const r = IT(0, 6000, 0);
    test('T07', 'B2 · Interest £6,000 only → PA absorbs all → tax = £0', r.tax, 0);
  })();

  // T08 — Salary £12,570 + interest £8,000
  // PA consumed by salary → nsNet=0; savNet=8000
  // srsAvail=5000; srsCover=5000; savAfterSRS=3000
  // taxableForPSA=8000 ≤ 37700 → PSA=£1,000; savTaxable=2,000
  // savTax: bLeft=37700; 2000×20% = £400
  ;(function(){
    const r = IT(12570, 8000, 0);
    test('T08a', 'B3 · Sal £12,570 + int £8k → savTaxable = £2,000', r.savTaxable, 2000);
    test('T08b', 'B3 · Tax = £400 (SRS £5k + PSA £1k applied)',       r.tax,        400);
  })();

  // T09 — Salary £10,000 + interest £6,000
  // PA=12570; paRem after sal=2570; savNet=max(0,6000-2570)=3430; nsNet=0
  // srsAvail=max(0,5000-0)=5000; srsCover=min(3430,5000)=3430 → savAfterSRS=0
  // PSA covers nothing as savAfterSRS=0; savTaxable=0 → tax=£0
  ;(function(){
    const r = IT(10000, 6000, 0);
    test('T09a', 'B4 · Sal £10k + int £6k → SRS covers all post-PA interest → savTaxable = £0', r.savTaxable, 0);
    test('T09b', 'B4 · tax = £0',                                                                r.tax,        0);
  })();

  // ══════════════════════════════════════════════
  // C. Dividends
  // ══════════════════════════════════════════════

  // T10 — Dividends £500 only
  // total=500 < PA → divNet=0 → tax = £0
  ;(function(){
    const r = IT(0, 0, 500);
    test('T10', 'C1 · Dividends £500 only → within PA → tax = £0', r.tax, 0);
  })();

  // T11 — Salary £12,570 + dividends £10,000
  // nsNet=0; paRem=0; divNet=10000
  // divTaxable=max(0,10000-500)=9,500; used=0; bLeft=37700; 9500×10.75%=£1,021.25
  ;(function(){
    const r = IT(12570, 0, 10000);
    test('T11a', 'C2 · Sal £12,570 + div £10k → divTaxable = £9,500', r.divTaxable, 9500);
    test('T11b', 'C2 · Tax = £1,021.25',                               r.tax,        1021.25);
  })();

  // T12 — Dividends £12,570 only (exactly PA)
  // total=12570; PA absorbs all → divNet=0 → tax = £0
  ;(function(){
    const r = IT(0, 0, 12570);
    test('T12', 'C3 · Dividends £12,570 only → PA covers all → tax = £0', r.tax, 0);
  })();

  // T13 — Salary £10,000 + dividends £5,000
  // nsNet=0; paRem=2570; divNet=max(0,5000-2570)=2430
  // divTaxable=max(0,2430-500)=1930; used=0+0=0; bLeft=37700; 1930×10.75%=£207.48
  ;(function(){
    const r = IT(10000, 0, 5000);
    test('T13a', 'C4 · Sal £10k + div £5k → divTaxable = £1,930', r.divTaxable, 1930);
    test('T13b', 'C4 · Tax = £207.48',                             r.tax,        207.48);
  })();

  // ══════════════════════════════════════════════
  // D. Mixed Income (Critical)
  // ══════════════════════════════════════════════

  // T14 — Salary £10k + interest £5k + dividends £5k (no SIPP)
  // nsNet=0; paRem=2570; savNet=2430; paRem=0; divNet=5000
  // srsAvail=5000; srsCover=2430 → savAfterSRS=0; savTaxable=0
  // divTaxable=max(0,5000-500)=4500; used=0+2430=2430; bLeft=37700-2430=35270
  // divTax=4500×10.75%=£483.75
  ;(function(){
    const r = IT(10000, 5000, 5000);
    test('T14a', 'D1 · Sal £10k + int £5k + div £5k → savTaxable = £0 (SRS covers)',  r.savTaxable, 0);
    test('T14b', 'D1 · divTaxable = £4,500',                                            r.divTaxable, 4500);
    test('T14c', 'D1 · Tax = £483.75',                                                  r.tax,        483.75);
  })();

    // ── Runner ────────────────────────────────────────────────────────────
    function runSuite(logic) {
      // Re-wrap in a fresh IIFE so the suite's own `const results` and
      // `function test` are scoped inside, then return results to us.
      // The suite's globals (RetireCalc, RetireEngine, RetireData) are
      // already on window from the <script src> tags above.
      /* jshint evil:true */
      return (new Function(
        '"use strict";\n' + logic + '\nreturn results;'
      ))();
    }

    function renderRow(suite, passed, failed, bugs, total, errMsg) {
      const allPass = !errMsg && failed === 0;
      const tbody = document.getElementById('results-body');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="suite-name">
          ${suite.name}
          <a class="suite-link" href="${suite.file}" target="_blank">↗ open</a>
          ${errMsg ? '<br><span class="load-error">' + errMsg + '</span>' : ''}
        </td>
        <td><span class="n-pass">${errMsg ? '—' : passed}</span></td>
        <td><span class="${failed > 0 ? 'n-fail' : 'n-pass'}">${errMsg ? '—' : failed}</span></td>
        <td><span class="${bugs > 0 ? 'n-bug' : 'n-total'}">${errMsg ? '—' : (bugs > 0 ? bugs : '—')}</span></td>
        <td><span class="n-total">${errMsg ? '—' : total}</span></td>
        <td><span class="pill ${allPass ? 'pass' : 'fail'}">${allPass ? 'PASS' : (errMsg ? 'ERROR' : 'FAIL')}</span></td>
      `;
      tbody.appendChild(tr);
    }

    function renderBanner(passed, failed, bugs, total) {
      const el = document.getElementById('grand-total');
      const allPass = failed === 0;
      el.innerHTML = `
        <div><div class="label">PASSED</div><div class="count pass-count">${passed}</div></div>
        <div class="sep">/</div>
        <div><div class="label">FAILED</div><div class="count fail-count">${failed}</div></div>
        <div class="sep">/</div>
        <div><div class="label">KNOWN BUGS</div><div class="count" style="color:#fb923c">${bugs}</div></div>
        <div><div class="label">TOTAL</div><div class="count n-total">${total}</div></div>
        <span class="status-pill ${allPass ? 'all-pass' : 'has-fail'}">${allPass ? '✓ ALL PASS' : '✗ FAILURES'}</span>
      `;
      el.style.display = 'flex';
    }

    // ── Main ──────────────────────────────────────────────────────────────
    function runAll() {
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.textContent = 'Running…';
      document.getElementById('results-body').innerHTML = '';
      document.getElementById('grand-total').style.display = 'none';

      let grandPassed = 0, grandFailed = 0, grandBugs = 0, grandTotal = 0;

      for (const suite of SUITES) {
        let passed = 0, failed = 0, bugs = 0, total = 0, errMsg = null;
        try {
          const results = runSuite(suite.logic);
          for (const r of results) {
            if (r.knownBug) bugs++;
            else if (r.pass) passed++;
            else failed++;
          }
          total = results.length;
        } catch (e) {
          errMsg = e.message || String(e);
          failed = 1;
        }
        grandPassed += passed;
        grandFailed += failed;
        grandBugs   += bugs;
        grandTotal  += total;
        renderRow(suite, passed, failed, bugs, total, errMsg);
      }

      renderBanner(grandPassed, grandFailed, grandBugs, grandTotal);
      btn.textContent = '↺ Re-run';
      btn.disabled = false;
    }

    document.getElementById('run-btn').addEventListener('click', runAll);
  })();
