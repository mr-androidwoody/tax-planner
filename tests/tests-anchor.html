<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Anchor Tests</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; background: #0f1117; color: #e2e8f0;
      padding: 32px 24px; min-height: 100vh;
    }
    h1 { font-size: 20px; font-weight: 600; color: #f8fafc; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 13px; margin-bottom: 28px; }
    .summary { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .summary-pill { padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
    .pill-total { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .pill-pass  { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .pill-fail  { background: #2d0a0a; color: #f87171; border: 1px solid #991b1b; }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #475569;
      margin: 28px 0 6px; padding-bottom: 8px;
      border-bottom: 1px solid #1e293b;
    }
    .section-note {
      font-size: 11px; color: #475569; margin: 0 0 10px 0; line-height: 1.6;
      font-style: italic;
    }
    .section-note strong { color: #64748b; font-style: normal; }
    .test-row {
      display: grid;
      grid-template-columns: 24px 1fr 110px 110px 80px;
      align-items: center; gap: 0 12px;
      padding: 9px 12px; border-radius: 6px; margin-bottom: 3px;
    }
    .test-row:hover { background: #1a2235; }
    .test-row.pass { border-left: 3px solid #22c55e; }
    .test-row.fail { border-left: 3px solid #ef4444; background: #1a0f0f; }
    .test-icon { font-size: 15px; text-align: center; }
    .test-icon.pass { color: #22c55e; }
    .test-icon.fail { color: #ef4444; }
    .test-label { color: #cbd5e1; font-size: 13px; }
    .test-label .test-id { color: #475569; font-size: 11px; margin-right: 6px; font-weight: 600; }
    .col-headers {
      display: grid;
      grid-template-columns: 24px 1fr 110px 110px 80px;
      gap: 0 12px; padding: 0 12px 6px; margin-bottom: 2px;
    }
    .col-header { font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #475569; text-align: right; }
    .val { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; text-align: right; }
    .val.expected { color: #64748b; }
    .val.actual.ok  { color: #86efac; }
    .val.actual.bad { color: #fca5a5; font-weight: 700; }
    .val.delta.ok   { color: #475569; }
    .val.delta.bad  { color: #f87171; }
  </style>
</head>
<body>

<h1>Anchor Tests</h1>
<p class="subtitle">Core tax engine correctness · PA · SRS · PSA · CGT · SIPP · taper · isolation</p>

<div class="summary" id="summary"></div>
<div id="output"></div>

<script src="../js/data.js"></script>
<script src="../js/calculator.js"></script>
<script src="../js/engine.js"></script>

<script>
(function () {

  const C   = window.RetireCalc;
  const TAX = window.RetireData.TAX_RULES['2026-27'];
  const P   = 0.02; // £0.02 tolerance throughout — all pure tax function calls

  const results = [];
  function test(id, label, actual, expected, tol) {
    tol = tol !== undefined ? tol : P;
    const delta = Math.abs((actual || 0) - expected);
    results.push({ id, label, actual: actual || 0, expected, delta, pass: delta <= tol });
  }

  function IT(ns, sav, div) {
    return C.calcIncomeTaxDetailed(ns || 0, sav || 0, div || 0, TAX);
  }

  // ─────────────────────────────────────────────────────────────
  // SECTION A — CORE ANCHOR TESTS
  // ─────────────────────────────────────────────────────────────

  // A1 — SRS full coverage
  // Salary £10,000: PA absorbs £10,000; paRem = £2,570 left
  // Interest £6,000: savNet = 6000 − 2570 = £3,430 (PA takes the rest)
  // srsAvail = max(0, 5000 − nsNet=0) = £5,000; srsCover = £3,430 → savAfterSRS = £0
  // savTaxable = 0; tax = £0
  ;(function(){
    const r = IT(10000, 6000, 0);
    test('A1a', 'A1 · Sal £10k + int £6k → nsNet = £0',               r.nsNet,      0);
    test('A1b', 'A1 · savNet = £3,430 (PA covers £2,570 of interest)', r.savNet,     3430);
    test('A1c', 'A1 · srsCover = £3,430 (SRS fully covers savNet)',    r.srsCover,   3430);
    test('A1d', 'A1 · savTaxable = £0',                                r.savTaxable, 0);
    test('A1e', 'A1 · Tax = £0',                                       r.tax,        0);
  })();

  // A2 — PSA boundary: salary exactly fills basic band
  // Salary £50,270: nsNet = 50270 − 12570 = £37,700 (fills basic band exactly)
  // Interest £1,000: savNet = £1,000; srsAvail = max(0, 5000−37700) = £0
  // taxableForPSA = 37700+1000 = 38700 > 37700 → PSA = £500 (HIGHER tier)
  // savTaxable = 1000−500 = £500; savTax: basicBand used → all at 40% = £200
  // nsTax = 37700×20% = £7,540; total = £7,740
  // NOTE: brief expected PSA=£1,000 and tax=£0 — both wrong. At sal=£50,270 nsNet=£37,700
  // which pushes taxableForPSA above the £37,700 basic band width → higher PSA tier applies.
  ;(function(){
    const r = IT(50270, 1000, 0);
    test('A2a', 'A2 · Sal £50,270 + int £1k → nsNet = £37,700',       r.nsNet,      37700);
    test('A2b', 'A2 · PSA = £500 (higher tier: taxableForPSA=38,700)', r.psa,        500);
    test('A2c', 'A2 · savTaxable = £500 (1000−PSA500)',                r.savTaxable, 500);
    test('A2d', 'A2 · nsTax = £7,540',                                 r.nsTax,      7540);
    test('A2e', 'A2 · savTax = £200 (500×40%)',                        r.savTax,     200);
    test('A2f', 'A2 · Total tax = £7,740',                             r.tax,        7740);
  })();

  // A3 — PSA off-by-one: one pound above basic band
  // Salary £50,271: nsNet = £37,701 (one above basic band width of £37,700)
  // taxableForPSA = 37701+1000 = 38701 → still higher PSA tier (£500)
  // nsTax = 37700×20% + 1×40% = £7,540.40; savTax = 500×40% = £200; total = £7,740.40
  ;(function(){
    const r = IT(50271, 1000, 0);
    test('A3a', 'A3 · Sal £50,271 + int £1k → nsNet = £37,701',       r.nsNet,      37701);
    test('A3b', 'A3 · PSA = £500 (still higher tier)',                 r.psa,        500);
    test('A3c', 'A3 · nsTax = £7,540.40 (37700×20% + 1×40%)',         r.nsTax,      7540.40);
    test('A3d', 'A3 · savTax = £200',                                  r.savTax,     200);
    test('A3e', 'A3 · Total tax = £7,740.40',                          r.tax,        7740.40);
  })();

  // A4 — Dividend stacking baseline
  // Salary £12,570: PA exactly consumed by salary; nsNet=0, paRem=0
  // Dividends £2,000: divNet=£2,000; divTaxable = 2000−500 = £1,500
  // All in basic band: 1500×10.75% = £161.25
  // NOTE: brief said 8.75% — that is the pre-April-2024 rate. data.js uses 10.75%.
  ;(function(){
    const r = IT(12570, 0, 2000);
    test('A4a', 'A4 · Sal £12,570 + div £2k → divNet = £2,000',       r.divNet,     2000);
    test('A4b', 'A4 · divTaxable = £1,500 (2000−DA500)',               r.divTaxable, 1500);
    test('A4c', 'A4 · Tax = £161.25 (1500×10.75%)',                    r.tax,        161.25);
  })();

  // ─────────────────────────────────────────────────────────────
  // SECTION B — INTERACTION TESTS
  // ─────────────────────────────────────────────────────────────

  // B1 — Full stacking: salary + interest + dividends
  // Salary £10,000: nsNet=0; paRem=2570
  // Interest £3,000: savNet = 3000−2570 = £430; paRem=0
  // Dividends £5,000: divNet = £5,000
  // srsAvail=5000; srsCover=430 → savAfterSRS=0; savTaxable=0
  // divTaxable = 5000−500 = £4,500; used=0+430=430; bLeft=37270; 4500×10.75%=£483.75
  ;(function(){
    const r = IT(10000, 3000, 5000);
    test('B1a', 'B1 · Full stack → nsNet = £0',                        r.nsNet,      0);
    test('B1b', 'B1 · savNet = £430 (PA covers £2,570 of interest)',   r.savNet,     430);
    test('B1c', 'B1 · srsCover = £430 (SRS covers all savNet)',        r.srsCover,   430);
    test('B1d', 'B1 · savTaxable = £0',                                r.savTaxable, 0);
    test('B1e', 'B1 · divNet = £5,000',                                r.divNet,     5000);
    test('B1f', 'B1 · divTaxable = £4,500',                            r.divTaxable, 4500);
    test('B1g', 'B1 · Tax = £483.75',                                  r.tax,        483.75);
  })();

  // B2 — SRS erosion
  // Salary £4,000 + interest £5,000 → total = £9,000 < PA £12,570
  // PA absorbs everything: nsNet=0, savNet=0 → tax=£0
  // NOTE: brief expected SRS=£1,000 and some tax — incorrect. PA absorbs the full £9,000.
  // SRS only applies to savings income that has already cleared the PA.
  ;(function(){
    const r = IT(4000, 5000, 0);
    test('B2a', 'B2 · Sal £4k + int £5k → total < PA → nsNet = £0',   r.nsNet,      0);
    test('B2b', 'B2 · savNet = £0 (PA absorbs all interest)',          r.savNet,     0);
    test('B2c', 'B2 · Tax = £0',                                       r.tax,        0);
  })();

  // B3 — SRS fully lost (per brief), but total still below PA
  // Salary £6,000 + interest £5,000 → total = £11,000 < PA £12,570
  // PA absorbs everything: tax=£0
  // NOTE: brief expected SRS=£0 and some tax — incorrect for same reason as B2.
  ;(function(){
    const r = IT(6000, 5000, 0);
    test('B3a', 'B3 · Sal £6k + int £5k → total < PA → nsNet = £0',   r.nsNet,      0);
    test('B3b', 'B3 · savNet = £0 (PA absorbs all interest)',          r.savNet,     0);
    test('B3c', 'B3 · Tax = £0',                                       r.tax,        0);
  })();

  // ─────────────────────────────────────────────────────────────
  // SECTION C — PA TAPER PRECISION
  // ─────────────────────────────────────────────────────────────

  // C1 — Taper start: income = £100,000 exactly
  // Condition is totalIncome > taperStart (strict >), so 100000 > 100000 = false → PA = £12,570
  // nsNet = 100000−12570 = £87,430
  // nsTax = 37700×20% + 49730×40% = 7540 + 19892 = £27,432
  ;(function(){
    const r = IT(100000, 0, 0);
    test('C1a', 'C1 · Income £100k (= taperStart, strict >) → PA = £12,570', r.pa,    12570);
    test('C1b', 'C1 · nsNet = £87,430',                                        r.nsNet, 87430);
    test('C1c', 'C1 · Tax = £27,432',                                          r.tax,   27432);
  })();

  // C2 — Mid taper: income = £110,000
  // taper = floor((110000−100000)/2) = 5000 → PA = 12570−5000 = £7,570
  // nsNet = 110000−7570 = £102,430
  // nsTax = 37700×20% + (102430−37700)×40% = 7540 + 64730×40% = 7540+25892 = £33,432
  ;(function(){
    const r = IT(110000, 0, 0);
    test('C2a', 'C2 · Income £110k → PA = £7,570 (taper −£5,000)',    r.pa,    7570);
    test('C2b', 'C2 · nsNet = £102,430',                               r.nsNet, 102430);
    test('C2c', 'C2 · Tax = £33,432',                                  r.tax,   33432);
  })();

  // C3 — PA fully tapered: income = £125,140
  // taper = floor((125140−100000)/2) = floor(12570) = 12570 → PA = 0
  // nsNet = £125,140
  // nsTax = 37700×20% + 74870×40% + 12570×45% = 7540+29948+5656.5 = £43,144.50
  ;(function(){
    const r = IT(125140, 0, 0);
    test('C3a', 'C3 · Income £125,140 → PA = £0 (fully tapered)',      r.pa,    0);
    test('C3b', 'C3 · nsNet = £125,140',                               r.nsNet, 125140);
    test('C3c', 'C3 · Tax = £43,144.50',                               r.tax,   43144.50);
  })();

  // ─────────────────────────────────────────────────────────────
  // SECTION D — CGT INTEGRATION
  // ─────────────────────────────────────────────────────────────

  // D1 — No income: full basic band available for CGT
  // Gain £20,000; taxableGain = 20000−3000 = £17,000
  // taxableIncomeAfterPA = 0; basicRemaining = £37,700
  // All at basic rate: 17000×18% = £3,060
  ;(function(){
    const taxableGain = Math.max(0, 20000 - TAX.cgtExempt);
    const cgt = C.calcCGT(0, taxableGain, TAX);
    test('D1a', 'D1 · Income £0, gain £20k → taxableGain = £17,000',  taxableGain, 17000);
    test('D1b', 'D1 · All basic band available → CGT = £3,060 (×18%)', cgt,         3060);
  })();

  // D2 — Income partially fills basic band
  // Income £40,000: nsNet = 40000−12570 = £27,430; basicRemaining = 37700−27430 = £10,270
  // Gain £20,000; taxableGain = £17,000
  // atBasic = 10270×18% = £1,848.60; atHigher = 6730×24% = £1,615.20; total = £3,463.80
  ;(function(){
    const it = IT(40000, 0, 0);
    const taxableGain = Math.max(0, 20000 - TAX.cgtExempt);
    const cgt = C.calcCGT(it.taxableIncomeAfterPA, taxableGain, TAX);
    test('D2a', 'D2 · Income £40k → nsNet = £27,430; basicRemaining = £10,270', it.nsNet, 27430);
    test('D2b', 'D2 · taxableGain = £17,000',                                    taxableGain, 17000);
    test('D2c', 'D2 · CGT = £3,463.80 (split 10270×18% + 6730×24%)',            cgt, 3463.80);
  })();

  // ─────────────────────────────────────────────────────────────
  // SECTION E — SIPP TAX TREATMENT
  // ─────────────────────────────────────────────────────────────

  // E1 — Simple SIPP draw
  // Withdrawal £20,000: 25% tax-free → taxable = £15,000
  // nsNet = 15000−12570 = £2,430; nsTax = 2430×20% = £486
  ;(function(){
    const taxable = 20000 * 0.75; // £15,000
    const r = IT(taxable, 0, 0);
    test('E1a', 'E1 · SIPP £20k → taxable = £15,000',              taxable,  15000);
    test('E1b', 'E1 · nsNet = £2,430 (15000−PA)',                   r.nsNet,  2430);
    test('E1c', 'E1 · Tax = £486 (2430×20%)',                       r.tax,    486);
  })();

  // E2 — SIPP + salary: no double counting
  // Salary £10,000 + SIPP taxable £15,000 → nonSavings = £25,000
  // nsNet = 25000−12570 = £12,430; nsTax = 12430×20% = £2,486
  ;(function(){
    const sippTaxable = 20000 * 0.75; // £15,000
    const r = IT(10000 + sippTaxable, 0, 0);
    test('E2a', 'E2 · Sal £10k + SIPP taxable £15k → nsNet = £12,430', r.nsNet, 12430);
    test('E2b', 'E2 · Tax = £2,486 (12430×20%)',                        r.tax,   2486);
  })();

  // ─────────────────────────────────────────────────────────────
  // SECTION F — ENGINE INTEGRITY
  // ─────────────────────────────────────────────────────────────

  // F1 — Zero everything
  ;(function(){
    const r = IT(0, 0, 0);
    test('F1', 'F1 · All inputs = 0 → tax = £0', r.tax, 0);
  })();

  // F2 — High income: PA fully removed by taper
  // Salary £200,000: taper = floor((200000−100000)/2) = 50000 > PA → PA = 0
  // nsNet = £200,000; nsTax = 37700×20% + 74870×40% + 87430×45%
  // = 7540 + 29948 + 39343.50 = £76,831.50
  ;(function(){
    const r = IT(200000, 0, 0);
    test('F2a', 'F2 · Salary £200k → PA = £0 (taper)',       r.pa,    0);
    test('F2b', 'F2 · nsNet = £200,000',                     r.nsNet, 200000);
    test('F2c', 'F2 · Tax = £76,831.50',                     r.tax,   76831.50);
  })();

  // F3 — Single-source isolation: confirms no cross-contamination between income types
  // F3a: salary only £20,000 → nsNet=7430; tax=7430×20%=£1,486
  // F3b: interest only £20,000 → savNet=7430 (PA absorbs 12570); srsAvail=5000→srsCover=5000;
  //      savAfterSRS=2430; PSA=1000; savTaxable=1430; tax=1430×20%=£286
  // F3c: dividends only £20,000 → divNet=7430; divTaxable=6930; tax=6930×10.75%=£744.975
  ;(function(){
    const ra = IT(20000, 0, 0);
    test('F3a-a', 'F3a · Salary £20k only → nsNet = £7,430',    ra.nsNet,      7430);
    test('F3a-b', 'F3a · savNet = £0 (no interest)',             ra.savNet,     0);
    test('F3a-c', 'F3a · divTaxable = £0 (no dividends)',        ra.divTaxable, 0);
    test('F3a-d', 'F3a · Tax = £1,486',                          ra.tax,        1486);
  })();
  ;(function(){
    const rb = IT(0, 20000, 0);
    test('F3b-a', 'F3b · Interest £20k only → nsNet = £0 (no salary)',  rb.nsNet,      0);
    test('F3b-b', 'F3b · srsCover = £5,000 (SRS fully used)',           rb.srsCover,   5000);
    test('F3b-c', 'F3b · savTaxable = £1,430 (SRS+PSA applied)',        rb.savTaxable, 1430);
    test('F3b-d', 'F3b · divTaxable = £0 (no dividends)',               rb.divTaxable, 0);
    test('F3b-e', 'F3b · Tax = £286',                                   rb.tax,        286);
  })();
  ;(function(){
    const rc = IT(0, 0, 20000);
    test('F3c-a', 'F3c · Dividends £20k only → nsNet = £0 (no salary)', rc.nsNet,      0);
    test('F3c-b', 'F3c · savTaxable = £0 (no interest)',                 rc.savTaxable, 0);
    test('F3c-c', 'F3c · divNet = £7,430 (20000−PA 12570)',              rc.divNet,     7430);
    test('F3c-d', 'F3c · divTaxable = £6,930 (7430−DA500)',              rc.divTaxable, 6930);
    test('F3c-e', 'F3c · Tax = £744.975 (6930×10.75%)',                  rc.tax,        744.975);
  })();

  // ─────────────────────────────────────────────────────────────
  // Render
  // ─────────────────────────────────────────────────────────────
  const total  = results.length;
  const passed = results.filter(r => r.pass).length;
  const failed = total - passed;

  document.getElementById('summary').innerHTML = `
    <span class="summary-pill pill-total">${total} assertions</span>
    <span class="summary-pill pill-pass">✓ ${passed} passed</span>
    ${failed > 0 ? `<span class="summary-pill pill-fail">✗ ${failed} failed</span>` : ''}
  `;

  const groups = {
    'A — Core Anchors: SRS · PSA boundary · PSA off-by-one · Dividend baseline':
      results.filter(r => /^A/.test(r.id)),
    'B — Interaction: Full stacking · SRS erosion · SRS/PA confusion':
      results.filter(r => /^B/.test(r.id)),
    'C — PA Taper Precision: start · mid · zero':
      results.filter(r => /^C/.test(r.id)),
    'D — CGT Integration: no income · band split':
      results.filter(r => /^D/.test(r.id)),
    'E — SIPP Tax Treatment: simple · with salary':
      results.filter(r => /^E/.test(r.id)),
    'F — Engine Integrity: zero · high income · single-source isolation':
      results.filter(r => /^F/.test(r.id)),
  };

  function fmt(n) {
    return '£' + (n || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  const out = document.getElementById('output');
  for (const [title, rows] of Object.entries(groups)) {
    if (!rows.length) continue;
    const sec = document.createElement('div');

    const note = {
      'A — Core Anchors: SRS · PSA boundary · PSA off-by-one · Dividend baseline':
        'A2 brief said PSA=£1,000/tax=£0 — corrected to PSA=£500/tax=£7,740 (sal=£50,270 pushes taxableForPSA above £37,700 basic band width). A4 brief said 8.75% — corrected to 10.75% (data.js post-Apr-2024 rate).',
      'B — Interaction: Full stacking · SRS erosion · SRS/PA confusion':
        'B2 and B3 brief expected SRS tiers and positive tax — corrected to tax=£0. At total income below PA (B2=£9,000, B3=£11,000) the PA absorbs everything; SRS never engages.',
    };

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = title;
    sec.appendChild(titleEl);

    if (note[title]) {
      const noteEl = document.createElement('div');
      noteEl.className = 'section-note';
      noteEl.textContent = note[title];
      sec.appendChild(noteEl);
    }

    const hdrs = document.createElement('div');
    hdrs.className = 'col-headers';
    hdrs.innerHTML = `<span></span><span></span>
      <span class="col-header">Expected</span>
      <span class="col-header">Actual</span>
      <span class="col-header">Δ</span>`;
    sec.appendChild(hdrs);

    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = `test-row ${r.pass ? 'pass' : 'fail'}`;
      row.innerHTML = `
        <span class="test-icon ${r.pass ? 'pass' : 'fail'}">${r.pass ? '✓' : '✗'}</span>
        <span class="test-label"><span class="test-id">${r.id}</span>${r.label}</span>
        <span class="val expected">${fmt(r.expected)}</span>
        <span class="val actual ${r.pass ? 'ok' : 'bad'}">${fmt(r.actual)}</span>
        <span class="val delta ${r.pass ? 'ok' : 'bad'}">${r.pass ? '—' : fmt(r.delta)}</span>
      `;
      sec.appendChild(row);
    });

    out.appendChild(sec);
  }


  // ── Report results to parent harness ──
  if (window.parent !== window) {
    const total  = results.length;
    const passed = results.filter(r => r.pass).length;
    window.parent.postMessage({
      type: 'suite-results',
      file: window.location.pathname.split('/').pop(),
      total,
      passed,
      failed: total - passed,
      results: results.map(r => ({ id: r.id, label: r.label, pass: r.pass, actual: r.actual, expected: r.expected, delta: r.delta })),
    }, '*');
  }

})();
</script>
</body>
</html>
